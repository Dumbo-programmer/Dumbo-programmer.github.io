    <body class="d-flex flex-column bg-dark">

                        <ul class="navbar-nav ms-auto mb-2 mb-lg-0 small fw-bolder">

            <!-- Page content-->
            <section class="py-5">
                <div class="container px-5">
                    <!-- Contact form-->
                    <div class="bg-dark rounded-4 py-5 px-4 px-md-5">
                        <div class="text-center mb-5">
                            <div class="feature bg-primary bg-gradient-primary-to-secondary text-white rounded-3 mb-3"><i class="bi bi-envelope"></i></div>
                            <h1 class="fw-bolder text-white">Get in touch</h1>
                            <p class="lead fw-normal text-muted mb-0">Let's work together!</p>
                        </div>
                        <div class="row gx-5 justify-content-center">
                            <div class="col-lg-8 col-xl-6">
                                <!-- * * * * * * * * * * * * * * *-->

                                <form id="contactForm">
                                    <!-- Name input-->
                                    <div class="form-floating mb-3">
                                        <input class="form-control bg-dark text-light" id="name" type="text" placeholder="Enter your name..."  />
                                        <label for="name" class="text-light">Full name</label>
                                        <div class="invalid-feedback text-light" >A name is required.</div>
                                    </div>
                                    <!-- Email address input-->
                                    <div class="form-floating mb-3">
                                        <input class="form-control bg-dark text-light" id="email" type="email" placeholder="name@example.com" />
                                        <label for="email" class="text-light">Email address</label>
                                        <div class="invalid-feedback text-light" >An email is required.</div>
                                        <div class="invalid-feedback text-light" >Email is not valid.</div>
                                    </div>
                                    <!-- Phone number input-->
                                    <div class="form-floating mb-3">
                                        <input class="form-control bg-dark text-light" id="phone" type="tel" placeholder="(123) 456-7890"  />
                                        <label for="phone" class="text-light">Phone number</label>
                                        <div class="invalid-feedback text-light" >A phone number is required.</div>
                                    </div>
                                    <!-- Message input-->
                                    <div class="form-floating mb-3">
                                        <textarea class="form-control bg-dark text-light" id="message" type="text" placeholder="Enter your message here..." style="height: 10rem" ></textarea>
                                        <label for="message" class="text-light">Message</label>
                                        <div class="invalid-feedback text-light">A message is required.</div>
                                    </div>
                                    <!-- Submit success message-->
                                    <!---->
                                    <!-- This is what your users will see when the form-->
                                    <!-- has successfully submitted-->
                                    
                                    <!-- Submit Button-->
                                    <div class="d-grid"><button class="btn btn-outline-primary btn-lg " id="submitButton">Submit</button></div>
                                </form>
                                
                            </div>
                        </div>
                    </div>
                </div>
            </section>
        </main>
        <!-- Footer-->
        <footer class="bg-dark py-4 mt-auto">

<script>
var firebaseConfig = {
    apiKey: "AIzaSyBMyzdV5WfY2ksw4DNbv38SMJASVoXqgIU",
  authDomain: "myweb-caae5.firebaseapp.com",
  projectId: "myweb-caae5",
  storageBucket: "myweb-caae5.appspot.com",
  messagingSenderId: "621235892607",
  appId: "1:621235892607:web:af559d09fadb6e1d862a4a",
  measurementId: "G-P1CFJ3GLXD"
};
// Initialize Firebase
firebase.initializeApp(firebaseConfig);

let db = firebase.firestore();

document.getElementById("submitButton").addEventListener("click", function(event) {
            event.preventDefault(); // Prevent the default form submit

            // Get form values
            var name = document.getElementById("name").value;
            var email = document.getElementById("email").value;
            var phone = document.getElementById("phone").value;
            var message = document.getElementById("message").value;

            // Form validation
            if (name.trim() === "" || email.trim() === "" || phone.trim() === "" || message.trim() === "") {
                alert("Please fill in all fields.");
                return;
            }

            // Add a new document with a generated ID to the "contacts" collection
            db.collection("contacts").add({
                name: name,
                email: email,
                phone: phone,
                message: message
            })
            .then(function(docRef) {
                // Show confirmation modal
                var myModal = new bootstrap.Modal(document.getElementById('confirmationModal'));
                myModal.show();
                // Optionally, you can display a success message to the user

                // Redirect to index page after modal is closed
                myModal._element.addEventListener('hidden.bs.modal', function () {
                    window.location.href = "index.html";
                });
            })
            .catch(function(error) {
                // Handle errors
                console.error("Error adding document: ", error);
                // Optionally, you can display an error message to the user
            });
        });


</script>
<div class="modal fade" id="confirmationModal" tabindex="-1" aria-labelledby="confirmationModalLabel" aria-hidden="true">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title" id="confirmationModalLabel">Confirmation</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="modal-body">
                Form submitted successfully!
            </div>
        </div>
    </div>
</div>
